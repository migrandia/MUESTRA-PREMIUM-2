<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Nuestra Boda | Marta & Javier</title>
    <meta property="og:title" content="¡Nuestra Boda! Marta & Javier">
    <meta property="og:description" content="Acompáñanos a celebrar nuestro amor el 14 de Febrero de 2027.">
    <meta property="og:image" content="https://www.dropbox.com/scl/fi/pd9mjnnpuz1awyw4memr7/novios-de-frente.jpg?rlkey=fzbs6iftt0125yat387uxnbei&raw=1">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fondo-papel: #faf6f0; 
            --color-acento: #8e735b; 
            --color-oro: #c5a059; 
            --ancho-max: 480px; 
        }

        body { margin: 0; padding: 0; background-color: #f5f5f5; font-family: 'Playfair Display', serif; text-align: center; }

        .invitation-wrapper {
            max-width: var(--ancho-max); margin: 0 auto; background-color: var(--fondo-papel);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden;
        }

        /* --- CONTADOR --- */
        .seccion-reloj {
            background: #fff; margin: 20px; padding: 25px 10px;
            border: 2px solid var(--color-oro); border-radius: 12px;
        }
        .txt-faltan { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: var(--color-acento); display: block; margin-bottom: 15px; }
        
        .timer-grid { display: flex; justify-content: center; gap: 10px; }
        .t-box { background: var(--fondo-papel); padding: 10px; border-radius: 8px; min-width: 65px; border: 1px solid #eee; }
        .t-num { display: block; font-size: 1.8rem; color: var(--color-oro); font-weight: bold; line-height: 1; }
        .t-tag { font-size: 0.6rem; text-transform: uppercase; color: #888; margin-top: 5px; display: block; }

        /* --- BOTONES CON ICONO DE MAPA --- */
        .btn-mapa {
            display: inline-flex; align-items: center; justify-content: center;
            margin-top: 20px; padding: 12px 25px; background: white;
            color: var(--color-acento); text-decoration: none;
            border: 1px solid var(--color-oro); border-radius: 30px;
            font-size: 0.75rem; font-weight: bold; letter-spacing: 1px;
        }
        .icon-pin { width: 14px; height: 14px; margin-right: 8px; fill: var(--color-oro); }

        .hero { padding: 30px 20px; background: white; }
        .img-full { width: 100%; border-radius: 4px; display: block; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: var(--color-acento); margin: 15px 0; font-weight: normal; }
        
        section { padding: 40px 20px; border-bottom: 1px solid #eee; }
        .caja-info { background: white; padding: 30px 15px; border-radius: 8px; border: 1px solid #eee; }
        .btn-ws { display: inline-block; padding: 20px; background: var(--color-acento); color: white; text-decoration: none; border-radius: 30px; width: 85%; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body onclick="document.getElementById('track').play()">

    <audio id="track" loop>
        <source src="https://www.dropbox.com/scl/fi/80hypdxkg24wx6x7oael2/En-Tus-Manos-Se-or.mp3?rlkey=j4di62c9sgj4txgwbpikcngp3&raw=1" type="audio/mpeg">
    </audio>

    <div class="invitation-wrapper">
        
        <div class="hero">
            <img src="https://www.dropbox.com/scl/fi/pd9mjnnpuz1awyw4memr7/novios-de-frente.jpg?rlkey=fzbs6iftt0125yat387uxnbei&raw=1" class="img-full">
            <h1>Marta & Javier</h1>
            <p style="letter-spacing: 4px; color: var(--color-oro); font-weight: bold;">14 . FEBRERO . 2027</p>
        </div>

        <div class="seccion-reloj">
            <span class="txt-faltan">Faltan para el Gran Día</span>
            <div class="timer-grid">
                <div class="t-box"><span class="t-num" id="d">00</span><span class="t-tag">Días</span></div>
                <div class="t-box"><span class="t-num" id="h">00</span><span class="t-tag">Hrs</span></div>
                <div class="t-box"><span class="t-num" id="m">00</span><span class="t-tag">Min</span></div>
                <div class="t-box"><span class="t-num" id="s">00</span><span class="t-tag">Seg</span></div>
            </div>
        </div>

        <section>
            <h2 style="font-family: 'Great Vibes'; font-size: 2.5rem; color: var(--color-acento);">La Ceremonia</h2>
            <div class="caja-info">
                <p><strong>Catedral de la Inmaculada Concepción</strong></p>
                <p>Xalapa, Veracruz | 17:00 Horas</p>
                <a href="https://maps.google.com" target="_blank" class="btn-mapa">
                    <svg class="icon-pin" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                    VER UBICACIÓN
                </a>
            </div>
        </section>

        <section style="background: white; border: none; padding-bottom: 80px;">
            <h2 style="font-family: 'Great Vibes'; font-size: 3rem; color: var(--color-acento);">¡Te esperamos!</h2>
            <a href="https://wa.me/5212281234567" class="btn-ws">CONFIRMAR ASISTENCIA</a>
        </section>

    </div>

    <script>
        function updateTimer() {
            // Fecha para 2027 para que veas el contador activo
            const target = new Date("February 14, 2027 17:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
